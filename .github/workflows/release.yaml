name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      task:
        description: Release task to run.
        required: true
        type: choice
        default: release-please
        options:
          - release-please
          - release-evidence

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    if: ${{ (github.event_name == 'push' && vars.RELEASE_PLEASE_ON_PUSH == 'true') || (github.event_name == 'workflow_dispatch' && inputs.task == 'release-please') }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    uses: NWarila/.github/.github/workflows/reusable-release-please.yaml@e7456b0219e8750fbef8bd70a0f1ccf7d47f1c20

  evidence:
    name: Release Evidence
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.task == 'release-evidence') }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    uses: ./.github/workflows/reusable-release-evidence.yaml
    with:
      ansible_core_version: "2.18.6"
      ansible_lint_version: "25.6.1"
      repo_type: framework
