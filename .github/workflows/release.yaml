name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      task:
        description: Release task to run.
        required: true
        type: choice
        default: release-please
        options:
          - release-please
          - release-evidence

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    if: ${{ (github.event_name == 'push' && vars.RELEASE_PLEASE_ON_PUSH == 'true') || (github.event_name == 'workflow_dispatch' && inputs.task == 'release-please') }}
    permissions:
      contents: write # required by release-please to create releases and tags
      pull-requests: write # required by release-please to maintain release PRs
      issues: write # required by release-please to maintain release metadata
      actions: write # required to dispatch release evidence after a release
    uses: NWarila/.github/.github/workflows/reusable-release-please.yaml@16fc66816dea5a593c0d5fbb0574ce3b54b46991

  evidence:
    name: Release Evidence
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.task == 'release-evidence') }}
    permissions:
      attestations: write # required to publish release attestations
      contents: write # required to attach release evidence
      id-token: write # required for OIDC-backed attestation signing
    uses: ./.github/workflows/reusable-release-evidence.yaml
    with:
      ansible_core_version: "2.18.6"
      ansible_lint_version: "25.6.1"
      repo_type: framework
