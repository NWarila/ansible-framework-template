name: CI

# Self-validation for ansible-framework-template. Exercises the reference
# framework end-to-end without credentials while keeping the same repo-quality
# surface derivative Ansible frameworks should inherit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  workflow-helper-tests:
    name: workflow helper tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install Bats and ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bats shellcheck
      - name: ShellCheck workflow helpers
        run: shellcheck tools/install_ci_tools.sh tools/ci/*.sh
      - name: Check workflow run-block input binding
        run: python tools/ci/check_workflow_run_inputs.py .github/workflows
      - name: Bats workflow helper tests
        run: bats tests/ci/*.bats

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: "**/*.md"

  ansible-ci:
    name: ansible verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible toolchain
        run: python -m pip install --no-cache-dir -r requirements-dev.txt

      - name: Install pinned CI tools
        env:
          # renovate: datasource=github-releases depName=rhysd/actionlint
          ACTIONLINT_VERSION: "1.7.12"
          # renovate: datasource=github-releases depName=open-policy-agent/opa
          OPA_VERSION: "1.10.0"
        run: bash tools/install_ci_tools.sh

      - name: Install Bats and ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bats shellcheck

      - name: Verify
        run: python tools/verify.py verify
