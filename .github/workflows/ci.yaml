name: CI

# Self-validation for ansible-framework-template. Exercises the reference
# framework end-to-end without credentials while keeping the same repo-quality
# surface derivative Ansible frameworks should inherit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  workflow-helper-tests:
    name: workflow helper tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install Bats and ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bats shellcheck
      - name: ShellCheck workflow helpers
        run: shellcheck tools/install_ci_tools.sh tools/ci/*.sh
      - name: Check workflow run-block input binding
        run: python tools/ci/check_workflow_run_inputs.py .github/workflows
      - name: Bats workflow helper tests
        run: bats tests/ci/*.bats

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: "**/*.md"

  mypy-advisory:
    name: mypy (advisory)
    # Type-check `tools/` to surface real regressions in static typing.
    # Advisory only — does not block merges. Use `::warning::` annotations
    # so findings are visible in PR review without failing the job.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install mypy
        run: pip install --no-cache-dir mypy==1.13.0 types-PyYAML==6.0.12.20240917
      - name: Run mypy (advisory)
        run: |
          python -m mypy --ignore-missing-imports tools/ \
            || echo "::warning::Mypy advisory reported findings (does not block merge)"

  ruff-sarif:
    name: ruff (SARIF → Security tab)
    # Runs ruff with --output-format sarif so Python static-analysis findings
    # flow into the consumer's GitHub Security tab alongside CodeQL, Trivy,
    # Gitleaks, zizmor, and Scorecard. continue-on-error keeps Security-tab
    # publishing advisory; existing verify.py lint gate remains the hard
    # block.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write # required to upload ruff SARIF
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install --no-cache-dir ruff==0.13.0
      - name: Run ruff with SARIF output
        continue-on-error: true
        run: ruff check --output-format sarif --output-file ruff.sarif tools/
      - name: Upload ruff SARIF
        if: always() && hashFiles('ruff.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: ruff.sarif

  ansible-ci:
    name: ansible verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible toolchain
        run: python -m pip install --no-cache-dir -r requirements-dev.txt

      - name: Install pinned CI tools
        env:
          # renovate: datasource=github-releases depName=rhysd/actionlint
          ACTIONLINT_VERSION: "1.7.12"
          # renovate: datasource=npm depName=markdownlint-cli2
          MARKDOWNLINT_CLI2_VERSION: "0.22.1"
          # renovate: datasource=github-releases depName=open-policy-agent/opa
          OPA_VERSION: "1.10.0"
        run: bash tools/install_ci_tools.sh

      - name: Install Bats and ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bats shellcheck

      - name: Verify
        run: python tools/verify.py verify
