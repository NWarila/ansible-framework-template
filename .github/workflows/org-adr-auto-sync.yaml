name: Org ADR Auto Sync

on:
  schedule:
    - cron: "19 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: org-adr-auto-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: org ADR auto-sync
    permissions:
      contents: read
      pull-requests: read
    uses: NWarila/.github/.github/workflows/reusable-org-adr-auto-sync.yaml@16fc66816dea5a593c0d5fbb0574ce3b54b46991
    with:
      source_repo: NWarila/.github
      source_ref: main
      branch_name: sync/org-adrs
      pr_title: "[sync] refresh org ADR mirrors"
    secrets:
      sync_token: ${{ secrets.ORG_ADR_SYNC_TOKEN }}
