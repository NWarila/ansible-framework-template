name: Auto-Merge

# Enables GitHub auto-merge on trusted-bot PRs once required status checks
# pass. Kept separate from release.yaml so pull_request_target has one
# narrow, reviewable purpose.

on:
  # zizmor: ignore[dangerous-triggers] ADR-template/0004 + OPA; no PR checkout.
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled]

permissions:
  contents: read # required by the reusable trust check context
  pull-requests: read # required to inspect pull request author metadata

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    permissions:
      contents: write # required by the reusable auto-merge command contract
      pull-requests: write # required to enable auto-merge on trusted-bot PRs
    uses: NWarila/.github/.github/workflows/reusable-auto-merge.yaml@16fc66816dea5a593c0d5fbb0574ce3b54b46991
