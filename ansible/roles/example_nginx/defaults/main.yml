---
example_nginx_defaults:
  state: present
  runtime:
    temp_parent: /tmp/ansible-example-nginx
    become: true
  package:
    names:
      - nginx
    state: present
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: 120
    remove_on_absent: false
  service:
    name: nginx
    enabled: true
    state: started
  nginx:
    user: nginx
    group: nginx
    worker_processes: auto
    worker_connections: 1024
    keepalive_timeout: 65
    server_tokens: false
    sendfile: true
    tcp_nopush: true
    gzip: true
    client_max_body_size: 16m
  paths:
    config: /etc/nginx/nginx.conf
    config_dir: /etc/nginx
    conf_d: /etc/nginx/conf.d
    default_site: /etc/nginx/conf.d/example_nginx.conf
    mime_types: /etc/nginx/mime.types
    web_root: /usr/share/nginx/html
    log_dir: /var/log/nginx
  default_site:
    enabled: true
    listen:
      - 80 default_server
    server_name:
      - _
    index_file: index.html
    index_title: Ansible framework NGINX example
    index_body: This page was rendered by the example_nginx role.
    health_path: /healthz
    root_mode: "0755"
    index_mode: "0644"
    extra_headers:
      - name: X-Content-Type-Options
        value: nosniff
      - name: X-Frame-Options
        value: DENY
  validation:
    enabled: true
    command: nginx -t
  cleanup:
    remove_web_root_on_absent: false
  passwords: {}
